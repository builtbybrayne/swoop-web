# Swoop Web Discovery — CI skeleton (chunk A.t3)
#
# Runs typecheck + lint + build + test on every PR that touches code.
# Planning-only PRs are skipped via the paths filter.
#
# Scope:
# - Node 20 pinned via .nvmrc (decision A.4).
# - Workspace lives in product/ — every npm step sets working-directory.
# - --if-present on build/test so empty-scaffold packages don't fail.
# - Concurrency group cancels superseded runs on rapid pushes.
# - No secrets, no deploy, no eval — those land in later chunks (B/C/D, H.t6).

name: CI

on:
  push:
    branches: [main]
    paths:
      - 'product/**'
      - '.github/workflows/**'
      - '.nvmrc'
      - '.gitignore'
      - '.editorconfig'
  pull_request:
    branches: [main]
    paths:
      - 'product/**'
      - '.github/workflows/**'
      - '.nvmrc'
      - '.gitignore'
      - '.editorconfig'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: typecheck + lint + build + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: product

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (from .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'product/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build --if-present

      - name: Test
        run: npm run test --if-present
